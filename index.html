<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAAM Analytics — Request Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee; --surface: #ffffff; --surface2: #f0ede6; --surface3: #e8e4db; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
  --text: #1a1a18; --text2: #6b6860; --text3: #a8a49a; --accent: #1a4a2e; --accent-light: #e8f2ec; --accent-mid: #2d7a4f;
  --radius: 8px; --radius-lg: 14px; --shadow: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --red: #c0392b; --red-light: #fdf0ee; --amber: #b8621a; --amber-light: #fef5ec; --blue: #1a3a6b; --blue-light: #eef3fc; --green: #1a4a2e; --green-light: #e8f2ec; --purple: #4a1a6b; --purple-light: #f3eef8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 230px; min-width: 230px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 22px 20px 18px; border-bottom: 1px solid var(--border); }
.logo-mark { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--accent); }
.logo-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.14em; font-family: 'IBM Plex Mono', monospace; margin-top: 3px; }
.sidebar-section { padding: 14px 12px 6px; }
.sidebar-label { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.12s; margin-bottom: 1px; border: 1px solid transparent; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); border-color: rgba(26,74,46,0.12); font-weight: 500; }
.nav-badge { margin-left: auto; background: var(--surface2); color: var(--text2); font-size: 10px; font-family: 'IBM Plex Mono', monospace; padding: 1px 6px; border-radius: 20px; }
.sidebar-footer { margin-top: auto; padding: 14px 12px; border-top: 1px solid var(--border); }
.share-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 12px; border-radius: var(--radius); background: var(--accent); border: none; color: #fff; font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.share-btn:hover { background: var(--accent-mid); }
.status-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-bottom: 8px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.status-dot.live { background: #2ecc71; }
.status-dot.error { background: var(--red); }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); position: sticky; top: 0; z-index: 20; }
.page-title { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; }
.content { padding: 24px 28px; overflow-y: auto; flex: 1; }
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow); }
.stat-label { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; }
.stat-value { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; margin-top: 4px; }
.filters-bar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.view-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px; gap: 2px; margin-left: auto; }
.view-btn { padding: 4px 10px; border-radius: 6px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 12px; }
.view-btn.active { background: var(--surface2); color: var(--text); font-weight: 500; }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--surface2); }
th { padding: 10px 14px; text-align: left; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--text3); text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:hover td { background: var(--bg); }
.ticket-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }
.p-critical { background: var(--red-light); color: var(--red); }
.p-high { background: var(--amber-light); color: var(--amber); }
.p-medium { background: var(--blue-light); color: var(--blue); }
.p-low { background: var(--surface2); color: var(--text3); }
.s-new { background: var(--accent-light); color: var(--accent); }
.s-progress { background: var(--purple-light); color: var(--purple); }
.s-review { background: var(--amber-light); color: var(--amber); }
.s-blocked { background: var(--red-light); color: var(--red); }
.s-done { background: var(--green-light); color: var(--green); }
.team-badge { padding: 2px 7px; border-radius: 5px; font-size: 11px; background: var(--surface2); color: var(--text2); font-family: 'IBM Plex Mono', monospace; }
.row-actions { display: flex; gap: 4px; }
.icon-btn { width: 26px; height: 26px; border: 1px solid var(--border); background: transparent; cursor: pointer; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; }
.icon-btn:hover { background: var(--surface2); }
.kanban-board { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 12px; align-items: start; }
.k-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
.k-header { padding: 11px 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); }
.k-title { font-size: 11px; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; color: var(--text2); font-weight: 500; }
.k-count { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--text3); background: var(--surface); padding: 2px 6px; border-radius: 20px; border: 1px solid var(--border); }
.k-body { padding: 8px; display: flex; flex-direction: column; gap: 7px; min-height: 50px; }
.k-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 11px; cursor: pointer; transition: all 0.12s; box-shadow: var(--shadow); }
.k-card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.k-card-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 7px; line-height: 1.4; }
.k-card-meta { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
.k-card-team { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }
.k-empty { font-size: 11px; color: var(--text3); text-align: center; padding: 14px 0; font-family: 'IBM Plex Mono', monospace; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius-lg); width: 540px; max-width: 95vw; padding: 24px; box-shadow: var(--shadow-md); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
.modal-close { cursor: pointer; background: transparent; border: none; font-size: 20px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--text3); text-transform: uppercase; margin-bottom: 5px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 8px 11px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; outline: none; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { padding: 8px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: 1px solid var(--border2); background: #fff; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-mid); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.detail-label { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--text3); text-transform: uppercase; }
.detail-value { font-size: 13px; margin-top: 2px; margin-bottom: 10px; }
.view-section { display: none; }
.view-section.active { display: block; }
.notify-box { background: #fffbf0; border: 1px solid #f0d060; padding: 10px; border-radius: var(--radius); margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; }
</style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">LAAM</div>
    <div class="logo-sub">Analytics Tracker</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Views</div>
    <div class="nav-item active" onclick="setView('dashboard',this)">Dashboard</div>
    <div class="nav-item" id="nav-all" onclick="setView('all',this)">All requests <span class="nav-badge" id="badge-all">0</span></div>
  </div>
  <div class="sidebar-footer">
    <div class="status-row">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
    <button class="share-btn" onclick="window.open('submit.html','_blank')">Intake Form ↗</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <button class="btn btn-primary" onclick="openNew()">+ New Request</button>
  </div>
  <div class="content">

    <div class="view-section active" id="view-dashboard">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total requests</div><div class="stat-value" id="stat-total">0</div></div>
        <div class="stat-card"><div class="stat-label">In progress</div><div class="stat-value" id="stat-progress">0</div></div>
        <div class="stat-card"><div class="stat-label">Urgent</div><div class="stat-value" id="stat-urgent">0</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="stat-done">0</div></div>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>Request</th><th>Team</th><th>Priority</th><th>Status</th><th>Assigned</th><th>Expected Date</th><th>Actions</th></tr></thead>
        <tbody id="dash-tbody"></tbody></table>
      </div>
    </div>

    <div class="view-section" id="view-all">
      <div class="filters-bar">
        <select id="f-assignee" onchange="render()"><option value="">All Assignees</option><option>Unassigned</option><option>Zain</option><option>Zarrar</option></select>
        <div class="view-toggle">
          <button class="view-btn active" id="vb-table" onclick="setSubView('table',this)">Table</button>
          <button class="view-btn" id="vb-kanban" onclick="setSubView('kanban',this)">Kanban</button>
        </div>
      </div>
      <div id="sub-table">
        <div class="table-wrap">
          <table><thead><tr><th>ID</th><th>Request</th><th>Team</th><th>Priority</th><th>Status</th><th>Assigned</th><th>Expected Date</th><th>Actions</th></tr></thead>
          <tbody id="all-tbody"></tbody></table>
        </div>
      </div>
      <div id="sub-kanban" style="display:none">
        <div class="kanban-board" id="kanban-board"></div>
      </div>
    </div>

  </div>
</main>
</div>

<div class="modal-overlay" id="modal-form">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="form-title">Edit Request</div><button class="modal-close" onclick="closeModal('modal-form')">×</button></div>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="fi-title"></div>
    <div class="form-group"><label class="form-label">Details</label><textarea class="form-textarea" id="fi-desc"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Team *</label>
        <select class="form-select" id="fi-team">
          <option>Marketing</option><option>Product & Eng</option><option>Growth</option><option>Commercials</option><option>Finance</option><option>Experience</option><option>Warehouse</option>
        </select></div>
      <div class="form-group"><label class="form-label">Priority *</label>
        <select class="form-select" id="fi-priority"><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="fi-status"><option>New</option><option>In Progress</option><option>Review</option><option>Blocked</option><option>Done</option></select></div>
      <div class="form-group"><label class="form-label">Assignee</label>
        <select class="form-select" id="fi-assignee"><option>Unassigned</option><option>Zain</option><option>Zarrar</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Submitted By</label><input class="form-input" id="fi-submitter"></div>
      <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" id="fi-email" type="email"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Expected Date</label><input class="form-input" type="date" id="fi-due"></div>
      <div class="form-group"><label class="form-label">Request Type</label>
        <select class="form-select" id="fi-format">
          <option value="New Dashboard">New Dashboard</option>
          <option value="Dashboard Modifications">Dashboard Modifications</option>
          <option value="Data Discrepancy Troubleshooting">Data Discrepancy Troubleshooting</option>
          <option value="Data Dump">Data Dump</option>
          <option value="Other">Other</option>
        </select></div>
    </div>
    <div class="notify-box">
      <input type="checkbox" id="fi-notify" checked>
      <label for="fi-notify"><strong>Notify Requester:</strong> Instantly dispatch email updating them about changes to this request.</label>
    </div>
    <div style="margin-top:20px; text-align:right;">
      <button class="btn" onclick="closeModal('modal-form')">Cancel</button>
      <button class="btn btn-primary" onclick="save()">Save Updates</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="det-title">Details</div><button class="modal-close" onclick="closeModal('modal-detail')">×</button></div>
    <div id="det-body"></div>
    <div style="text-align:right; margin-top:20px;">
      <button class="btn" onclick="closeModal('modal-detail')">Close</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
const SUPABASE_CDN = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
let sb = null; 
let tickets = [];
let subView = 'table';

async function init() {
  const script = document.createElement('script');
  script.src = SUPABASE_CDN;
  script.onload = async () => {
    if (typeof window.SUPABASE_URL === 'undefined') {
      setStatus('error', 'Config missing');
      return;
    }
    try {
      sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      const { data, error } = await sb.from('tickets').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      tickets = data || [];
      setStatus('live', 'Live ●');
      render();
    } catch (e) {
      setStatus('error', 'Config error');
    }
  };
  document.head.appendChild(script);
}

function setStatus(s, txt) {
  document.getElementById('status-text').textContent = txt;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + (s === 'live' ? 'live' : 'error');
}

function render() {
  const dashTbody = document.getElementById('dash-tbody');
  const allTbody = document.getElementById('all-tbody');
  const selectedAssigneeFilter = document.getElementById('f-assignee').value;
  
  // Apply visual filtering logic
  const filteredTickets = tickets.filter(t => {
    if (selectedAssigneeFilter && t.assignee !== selectedAssigneeFilter) return false;
    return true;
  });
  
  const generateRowHtml = (t) => `<tr>
    <td><span class="ticket-id">${t.ticket_id}</span></td>
    <td><strong>${esc(t.title)}</strong><br><small>${esc(t.submitter)}</small></td>
    <td><span class="team-badge">${t.team}</span></td>
    <td><span class="badge p-${t.priority.toLowerCase()}">${t.priority}</span></td>
    <td><span class="badge s-${t.status.toLowerCase().replace(' ', '')}">${t.status}</span></td>
    <td>${t.assignee || 'Unassigned'}</td>
    <td><code style="font-size:12px">${t.due_date || '—'}</code></td>
    <td>
      <button class="icon-btn" onclick="openDetail(${t.id})">👁</button>
      <button class="icon-btn" onclick="openEdit(${t.id})">✎</button>
    </td>
  </tr>`;

  dashTbody.innerHTML = tickets.map(generateRowHtml).join('');
  allTbody.innerHTML = filteredTickets.map(generateRowHtml).join('');
  
  renderKanban(filteredTickets);
  
  document.getElementById('stat-total').textContent = tickets.length;
  document.getElementById('stat-progress').textContent = tickets.filter(t => t.status === 'In Progress').length;
  document.getElementById('stat-urgent').textContent = tickets.filter(t => t.priority === 'Critical' || t.priority === 'High').length;
  document.getElementById('stat-done').textContent = tickets.filter(t => t.status === 'Done').length;
  document.getElementById('badge-all').textContent = tickets.length;
}

function renderKanban(filteredList) {
  const columns = ['New', 'In Progress', 'Review', 'Blocked', 'Done'];
  document.getElementById('kanban-board').innerHTML = columns.map(col => {
    const cards = filteredList.filter(t => t.status === col);
    return `<div class="k-col">
      <div class="k-header"><span class="k-title">${col}</span><span class="k-count">${cards.length}</span></div>
      <div class="k-body">${cards.length ? cards.map(t => `<div class="k-card" onclick="openDetail(${t.id})">
        <div class="k-card-title">${esc(t.title)}</div>
        <div class="k-card-meta"><span class="badge p-${t.priority.toLowerCase()}">${t.priority}</span><span class="k-card-team">${esc(t.team)}</span></div>
      </div>`).join('') : '<div class="k-empty">empty</div>'}</div>
    </div>`;
  }).join('');
}

function setSubView(v, btn) {
  subView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sub-table').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('sub-kanban').style.display = v === 'kanban' ? 'block' : 'none';
}

function openDetail(id) {
  const t = tickets.find(x => x.id === id);
  if (!t) return;
  document.getElementById('det-title').textContent = t.ticket_id;
  document.getElementById('det-body').innerHTML = `
    <div class="detail-grid">
      <div><div class="detail-label">Submitter</div><div class="detail-value">${esc(t.submitter)}</div></div>
      <div><div class="detail-label">Email Address</div><div class="detail-value"><code>${esc(t.email || 'N/A')}</code></div></div>
      <div><div class="detail-label">Team</div><div class="detail-value">${t.team}</div></div>
      <div><div class="detail-label">Priority</div><div class="detail-value">${t.priority}</div></div>
      <div><div class="detail-label">Status</div><div class="detail-value">${t.status}</div></div>
      <div><div class="detail-label">Assignee</div><div class="detail-value">${t.assignee}</div></div>
      <div><div class="detail-label">Expected Date</div><div class="detail-value"><code>${t.due_date || '—'}</code></div></div>
      <div><div class="detail-label">Request Type</div><div class="detail-value">${t.format || '—'}</div></div>
    </div>
    <div class="detail-label">Description</div><div class="detail-value">${esc(t.description || 'No description provided')}</div>
  `;
  document.getElementById('modal-detail').classList.add('open');
}

function openEdit(id) {
  const t = tickets.find(x => x.id === id);
  if (!t) return;
  
  // Force clean numeric assignment to hidden DOM element to stop duplicates
  document.getElementById('edit-id').value = t.id;
  
  document.getElementById('fi-title').value = t.title;
  document.getElementById('fi-desc').value = t.description || '';
  document.getElementById('fi-team').value = t.team;
  document.getElementById('fi-priority').value = t.priority;
  document.getElementById('fi-status').value = t.status;
  document.getElementById('fi-assignee').value = t.assignee || 'Unassigned';
  document.getElementById('fi-submitter').value = t.submitter;
  document.getElementById('fi-email').value = t.email || '';
  document.getElementById('fi-due').value = t.due_date || '';
  document.getElementById('fi-format').value = t.format || 'New Dashboard';
  document.getElementById('form-title').textContent = 'Edit Request';
  document.getElementById('modal-form').classList.add('open');
}

function openNew() {
  document.getElementById('edit-id').value = '';
  document.getElementById('fi-title').value = '';
  document.getElementById('fi-desc').value = '';
  document.getElementById('fi-submitter').value = '';
  document.getElementById('fi-email').value = '';
  document.getElementById('fi-due').value = '';
  document.getElementById('fi-team').value = 'Marketing';
  document.getElementById('fi-priority').value = 'High';
  document.getElementById('fi-status').value = 'New';
  document.getElementById('fi-assignee').value = 'Unassigned';
  document.getElementById('fi-format').value = 'New Dashboard';
  document.getElementById('form-title').textContent = 'Create Request';
  document.getElementById('modal-form').classList.add('open');
}

async function save() {
  const activeRecordId = document.getElementById('edit-id').value;
  const data = {
    title: document.getElementById('fi-title').value,
    description: document.getElementById('fi-desc').value,
    team: document.getElementById('fi-team').value,
    priority: document.getElementById('fi-priority').value,
    status: document.getElementById('fi-status').value,
    assignee: document.getElementById('fi-assignee').value,
    submitter: document.getElementById('fi-submitter').value,
    email: document.getElementById('fi-email').value,
    due_date: document.getElementById('fi-due').value || null,
    format: document.getElementById('fi-format').value
  };

  // Explicit string mapping validation check to route update vs creation queries safely
  if (activeRecordId && activeRecordId.trim() !== "") {
    await sb.from('tickets').update(data).eq('id', parseInt(activeRecordId, 10));
    if (document.getElementById('fi-notify').checked) {
      console.log(`[UPDATED EMAIL ALERT] Status modified to "${data.status}". Update fired to ${data.email}, zain@laam.pk, zarrar@laam.pk`);
    }
  } else {
    const tid = 'LAAM-' + String(Date.now()).slice(-6);
    await sb.from('tickets').insert([{ ...data, ticket_id: tid }]);
  }
  
  closeModal('modal-form');
  location.reload();
}

function setView(v, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

init();
</script>
</body>
</html>
